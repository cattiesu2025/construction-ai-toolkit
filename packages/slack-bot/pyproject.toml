[project]
name = "slack-bot"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "anthropic>=0.40",
    "slack-bolt>=1.18",
    "python-dotenv>=1.0",
    "core-tools",
]

[tool.uv.sources]
core-tools = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/slack_bot"]

[project.scripts]
run-slack-bot = "slack_bot.bot:main"
