[project]
name = "delay-agent"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "anthropic>=0.40",
    "apscheduler>=3.10",
    "python-dotenv>=1.0",
    "pyyaml>=6.0",
    "core-tools",
]

[tool.uv.sources]
core-tools = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/delay_agent"]

[project.scripts]
run-delay-agent = "delay_agent.agent:_cli"
run-eval = "delay_agent._eval_entry:main"
run-scheduler = "delay_agent.scheduler:main"
