[project]
name = "construction-mcp-server"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "mcp>=1.0",
    "python-dotenv>=1.0",
    "core-tools",
]

[tool.uv.sources]
core-tools = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/construction_mcp"]

[project.scripts]
construction-mcp = "construction_mcp.server:main"
